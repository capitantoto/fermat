# This is a YAML file: https://yaml.org/spec/1.2.2/
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, jupyter]
      - id: ruff-format
        types_or: [python, jupyter]
  - repo: local
    hooks:
      - id: typst-check
        name: typst compile check
        entry: bash -c 'tmp=$(mktemp /tmp/typst-check-XXXXXX.pdf); trap "rm -f $tmp" EXIT; for f in docs/tesis.typ docs/plan.typ; do [ -f "$f" ] && typst compile "$f" "$tmp" || exit 1; done'
        language: system
        files: '\.(typ|bib)$'
        pass_filenames: false
